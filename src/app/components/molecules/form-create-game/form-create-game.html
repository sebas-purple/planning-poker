<form class="form-create-game" (ngSubmit)="onSubmit()" >
    <app-input-name
    [error]="error"
    (valueChange)="onNameChange($event)"
    >
    </app-input-name>
    <app-button-primary
    [disabled]="!!error"
    [text]="'Crear Partida'"
    (click)="onSubmit()"
    >
    </app-button-primary>
</form>
